<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --teal:#00E0B8;--teal-dark:#00caa6;--teal-glow:rgba(0,224,184,0.18);
  --bg1:#020f18;--bg2:#041e18;--bg3:#052e2b;
  --glass:rgba(255,255,255,0.04);--glass2:rgba(0,224,184,0.06);
  --border:rgba(255,255,255,0.07);--border-teal:rgba(0,224,184,0.2);
  --red:#F87171;--green:#00E0B8;--yellow:#FFD43B;--orange:#FF9F43;
  --up:#00E0B8;--down:#F87171;
  --neon-blue:#00D4FF;--neon-purple:#9B5DE5;--neon-gold:#FFD43B;
  --mono:'JetBrains Mono',monospace;
}
body{font-family:'Inter',sans-serif;background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 50%,var(--bg3) 100%);color:white;overflow-x:hidden;min-height:100vh;}
body::before{content:"";position:fixed;width:100%;height:100%;background:radial-gradient(circle at 15% 25%,rgba(0,224,184,0.12),transparent 45%),radial-gradient(circle at 85% 75%,rgba(0,224,184,0.08),transparent 45%);z-index:-1;pointer-events:none;}
.no-scroll{overflow:hidden;}

/* ─── NAVBAR ─── */
.navbar{position:fixed;width:100%;top:0;display:flex;justify-content:space-between;align-items:center;padding:0 24px;height:56px;background:rgba(2,10,16,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border-teal);z-index:1000;}
.logo{font-family:'Cinzel',serif;font-size:19px;color:var(--teal);letter-spacing:1.5px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:8px;}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 10px var(--teal);animation:logoPulse 2s ease-in-out infinite;}
@keyframes logoPulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.nav-right{display:flex;align-items:center;gap:12px;}
.search-wrap{position:relative;}
.search-input{width:180px;padding:7px 12px 7px 34px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:white;font-size:12px;font-family:'Inter',sans-serif;outline:none;transition:0.2s;}
.search-input:focus{border-color:var(--teal);background:rgba(0,224,184,0.07);width:220px;}
.search-input::placeholder{opacity:0.4;font-size:11px;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.35);font-size:12px;pointer-events:none;}
.search-results{position:absolute;top:calc(100% + 6px);left:0;width:260px;background:rgba(5,20,30,0.98);border:1px solid var(--border-teal);border-radius:10px;padding:6px;z-index:2000;display:none;}
.search-results.show{display:block;}
.search-result-item{padding:9px 12px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:0.15s;}
.search-result-item:hover{background:var(--glass2);}
.sri-sym{font-size:12px;font-weight:700;color:var(--teal);}
.sri-price{font-size:11px;color:rgba(255,255,255,0.6);}
.sri-chg{font-size:11px;font-weight:600;}
.login-btn{padding:7px 16px;border:1px solid var(--teal);border-radius:8px;background:transparent;color:var(--teal);font-size:12px;font-weight:600;cursor:pointer;transition:0.2s;letter-spacing:0.4px;}
.login-btn:hover{background:rgba(0,224,184,0.1);}
.hamburger{width:24px;height:17px;position:relative;cursor:pointer;display:flex;flex-direction:column;justify-content:space-between;}
.hamburger span{display:block;width:100%;height:2px;background:white;border-radius:2px;transition:0.35s cubic-bezier(0.68,-0.55,0.27,1.55);transform-origin:center;}
.hamburger.open span:nth-child(1){transform:translateY(7.5px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0);}
.hamburger.open span:nth-child(3){transform:translateY(-7.5px) rotate(-45deg);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:0.3s;z-index:1500;}
.overlay.show{opacity:1;pointer-events:auto;}
.nav-menu{position:fixed;top:0;right:0;width:290px;height:100vh;background:rgba(4,16,24,0.99);backdrop-filter:blur(24px);border-left:1px solid var(--border-teal);padding:80px 28px 40px;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);z-index:2000;overflow-y:auto;}
.nav-menu.open{transform:translateX(0);}
.nav-menu a{text-decoration:none;color:rgba(255,255,255,0.82);font-size:15px;font-weight:500;padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.06);transition:color 0.2s;letter-spacing:0.3px;}
.nav-menu a:hover{color:var(--teal);}
.nav-menu a:last-of-type{border-bottom:none;}
.menu-divider{margin:20px 0 12px;font-size:10px;opacity:0.35;text-transform:uppercase;letter-spacing:2px;}
.social-row{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;}
.social-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);font-size:16px;text-decoration:none;transition:0.2s;}
.social-icon:hover{background:rgba(0,224,184,0.15);color:var(--teal);border-color:var(--border-teal);}
.social-icon.yt:hover{background:rgba(255,0,0,0.15);color:#FF0000;border-color:rgba(255,0,0,0.3);}
.social-icon.dc:hover{background:rgba(88,101,242,0.15);color:#5865F2;border-color:rgba(88,101,242,0.3);}
.social-icon.insta:hover{background:linear-gradient(135deg,rgba(240,148,51,0.25),rgba(188,24,136,0.25));color:#f09433;border-color:rgba(240,148,51,0.4);}

/* ─── BREAKING NEWS ALERT ─── */
.breaking-alert{display:none;position:fixed;top:56px;left:0;width:100%;z-index:980;background:linear-gradient(90deg,rgba(248,113,113,0.95),rgba(200,50,50,0.92));border-bottom:1px solid rgba(255,100,100,0.4);padding:8px 20px;align-items:center;gap:12px;backdrop-filter:blur(10px);}
.breaking-alert.show{display:flex;}
.breaking-label{font-size:10px;font-weight:800;letter-spacing:2px;color:white;background:rgba(255,255,255,0.2);padding:3px 8px;border-radius:4px;white-space:nowrap;}
.breaking-text{font-size:12px;font-weight:600;color:white;flex:1;line-height:1.4;}
.breaking-close{background:none;border:none;color:rgba(255,255,255,0.7);cursor:pointer;font-size:16px;flex-shrink:0;transition:0.2s;}
.breaking-close:hover{color:white;}

/* ─── TICKER ─── */
.ticker-bar{position:fixed;top:56px;left:0;width:100%;z-index:970;background:rgba(2,8,14,0.97);border-bottom:1px solid rgba(0,224,184,0.12);overflow:hidden;height:32px;display:flex;align-items:center;backdrop-filter:blur(10px);}
.ticker-bar.has-alert{top:98px;}
.weekend-banner{display:none;width:100%;height:100%;align-items:center;justify-content:center;gap:12px;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--teal);}
.weekend-banner.show{display:flex;}
.ticker-track{display:flex;gap:0;white-space:nowrap;animation:tickerScroll 70s linear infinite;will-change:transform;}
.ticker-track:hover{animation-play-state:paused;}
.ticker-item{display:inline-flex;align-items:center;gap:7px;padding:0 20px;font-size:11.5px;font-weight:600;border-right:1px solid rgba(255,255,255,0.05);letter-spacing:0.2px;cursor:default;}
.ticker-symbol{color:rgba(255,255,255,0.45);font-size:10.5px;}
.ticker-price{color:white;}
.ticker-change.up{color:var(--up);}
.ticker-change.down{color:var(--down);}
.ticker-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;}
.ticker-dot.up{background:var(--up);box-shadow:0 0 5px var(--up);}
.ticker-dot.down{background:var(--down);box-shadow:0 0 5px var(--down);}
.ticker-status{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;letter-spacing:0.5px;}
.ticker-status.open{background:rgba(0,224,184,0.15);color:var(--teal);}
.ticker-status.closed{background:rgba(248,113,113,0.15);color:var(--red);}
.ticker-status.delayed{background:rgba(255,213,59,0.15);color:var(--yellow);}
@keyframes tickerScroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}

/* ─── NEWS HERO ─── */
.news-hero{margin-top:88px;position:relative;overflow:hidden;background:#020e14;}
.news-hero.shifted{margin-top:128px;}
.news-slider{position:relative;width:100%;height:55vw;max-height:520px;min-height:280px;}
.news-slide{position:absolute;inset:0;opacity:0;transition:opacity 0.7s ease;pointer-events:none;}
.news-slide.active{opacity:1;pointer-events:auto;}
.news-slide-img{width:100%;height:100%;background-size:cover;background-position:center;position:relative;display:flex;align-items:flex-end;}
.news-slide-img::before{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(2,10,16,0.1) 0%,rgba(2,10,16,0.35) 40%,rgba(2,10,16,0.88) 80%,rgba(2,10,16,0.98) 100%);}
.news-cat-pill{position:absolute;top:14px;left:14px;z-index:5;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;border:1px solid;backdrop-filter:blur(6px);}
.news-cat-pill.forex{background:rgba(0,224,184,0.15);color:#00E0B8;border-color:rgba(0,224,184,0.35);}
.news-cat-pill.gold{background:rgba(255,213,59,0.15);color:#FFD43B;border-color:rgba(255,213,59,0.35);}
.news-cat-pill.oil{background:rgba(255,107,53,0.15);color:#FF6B35;border-color:rgba(255,107,53,0.35);}
.news-cat-pill.stocks{background:rgba(100,200,255,0.15);color:#64C8FF;border-color:rgba(100,200,255,0.35);}
.news-cat-pill.crypto{background:rgba(255,159,67,0.15);color:#FF9F43;border-color:rgba(255,159,67,0.35);}
.news-cat-pill.rates{background:rgba(155,93,229,0.15);color:#9B5DE5;border-color:rgba(155,93,229,0.35);}
.news-cat-pill.macro{background:rgba(255,69,96,0.15);color:#FF4560;border-color:rgba(255,69,96,0.35);}
.news-cat-pill.geo{background:rgba(136,146,176,0.15);color:#8892B0;border-color:rgba(136,146,176,0.35);}
.news-count-badge{position:absolute;top:14px;right:14px;z-index:10;background:rgba(0,224,184,0.12);border:1px solid rgba(0,224,184,0.2);color:var(--teal);font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;}
.news-slide-content{position:relative;z-index:5;padding:18px 22px 20px;width:100%;}
.news-source-badge{display:inline-block;background:rgba(0,224,184,0.15);border:1px solid rgba(0,224,184,0.25);color:var(--teal);font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:0.8px;margin-bottom:8px;}
.news-slide-headline{font-size:clamp(13px,2.5vw,21px);font-weight:700;line-height:1.35;color:white;margin-bottom:7px;text-shadow:0 1px 4px rgba(0,0,0,0.6);}
.news-slide-summary{font-size:clamp(11px,1.4vw,13px);color:rgba(255,255,255,0.68);line-height:1.6;max-width:600px;margin-bottom:10px;}
.impact-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.impact-badge{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:700;padding:3px 7px;border-radius:4px;letter-spacing:0.4px;text-transform:uppercase;}
.impact-badge.bullish{background:rgba(0,224,184,0.2);color:#00E0B8;border:1px solid rgba(0,224,184,0.35);}
.impact-badge.bearish{background:rgba(248,113,113,0.18);color:#F87171;border:1px solid rgba(248,113,113,0.3);}
.impact-badge.neutral{background:rgba(136,146,176,0.18);color:#8892B0;border:1px solid rgba(136,146,176,0.3);}
.news-read-btn{display:inline-block;padding:7px 16px;background:var(--teal);color:black;border-radius:6px;font-size:11.5px;font-weight:700;text-decoration:none;transition:0.2s;letter-spacing:0.4px;}
.news-read-btn:hover{background:#00caa6;transform:translateY(-1px);}
.news-nav-btn{position:absolute;top:50%;transform:translateY(-50%);width:38px;height:38px;border-radius:50%;background:rgba(2,10,16,0.7);border:1px solid rgba(0,224,184,0.25);color:white;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:0.2s;backdrop-filter:blur(6px);}
.news-nav-btn:hover{background:rgba(0,224,184,0.2);border-color:var(--teal);color:var(--teal);}
.news-prev{left:10px;}.news-next{right:10px;}
.news-dots{position:absolute;bottom:12px;right:18px;display:flex;gap:5px;z-index:10;}
.news-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.3);cursor:pointer;transition:0.3s;}
.news-dot.active{background:var(--teal);width:16px;border-radius:3px;}
.news-loading-spinner{width:32px;height:32px;border-radius:50%;border:3px solid rgba(0,224,184,0.2);border-top-color:var(--teal);animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ═══════════════════════════════════════════
   PAIR EXPLORER — PREMIUM TRADING TERMINAL
═══════════════════════════════════════════ */
.pair-explorer{max-width:1200px;margin:0 auto;padding:32px 18px 20px;}

/* Section header */
.pe-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.pe-title{font-family:'Cinzel',serif;font-size:18px;color:white;letter-spacing:1px;display:flex;align-items:center;gap:10px;}
.pe-title-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 12px var(--teal);animation:logoPulse 2s ease-in-out infinite;}
.pe-live-badge{font-size:9px;font-weight:700;letter-spacing:1.5px;background:rgba(0,224,184,0.15);color:var(--teal);border:1px solid rgba(0,224,184,0.3);padding:3px 8px;border-radius:4px;text-transform:uppercase;}

/* Category Tabs */
.pe-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.pe-tab{padding:7px 16px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);transition:all 0.2s;}
.pe-tab:hover{border-color:rgba(0,224,184,0.3);color:rgba(255,255,255,0.8);}
.pe-tab.active{background:rgba(0,224,184,0.12);border-color:var(--teal);color:var(--teal);box-shadow:0 0 16px rgba(0,224,184,0.1);}

/* Search bar */
.pe-search-wrap{position:relative;margin-bottom:16px;}
.pe-search{width:100%;padding:11px 16px 11px 40px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:white;font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:0.2s;}
.pe-search:focus{border-color:var(--teal);background:rgba(0,224,184,0.05);}
.pe-search::placeholder{color:rgba(255,255,255,0.3);}
.pe-search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:rgba(0,224,184,0.5);font-size:13px;pointer-events:none;}

/* Asset grid */
.pe-asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:20px;}
.pe-asset-btn{padding:10px 8px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);cursor:pointer;transition:all 0.2s;text-align:center;position:relative;overflow:hidden;}
.pe-asset-btn:hover{border-color:rgba(0,224,184,0.3);background:rgba(0,224,184,0.06);}
.pe-asset-btn.active{border-color:var(--teal);background:rgba(0,224,184,0.1);box-shadow:0 0 20px rgba(0,224,184,0.12);}
.pe-asset-btn.fav-active{border-color:var(--neon-gold)!important;background:rgba(255,213,59,0.08)!important;}
.pe-btn-sym{font-family:var(--mono);font-size:11.5px;font-weight:700;color:white;letter-spacing:0.3px;}
.pe-btn-price{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,0.6);margin-top:3px;}
.pe-btn-chg{font-family:var(--mono);font-size:10px;font-weight:700;margin-top:2px;}
.pe-btn-chg.up{color:var(--up);}
.pe-btn-chg.down{color:var(--down);}
.pe-fav-star{position:absolute;top:5px;right:6px;font-size:9px;cursor:pointer;color:rgba(255,255,255,0.2);transition:0.2s;z-index:2;}
.pe-fav-star.active{color:var(--neon-gold);}

/* ── TERMINAL PANEL ── */
.pe-terminal{background:rgba(3,12,20,0.9);border:1px solid rgba(0,224,184,0.2);border-radius:16px;padding:20px;backdrop-filter:blur(16px);box-shadow:0 0 60px rgba(0,224,184,0.06);position:relative;overflow:hidden;display:none;}
.pe-terminal.show{display:block;}
.pe-terminal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--teal),transparent);}

/* Header row */
.pt-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px;}
.pt-pair-info{display:flex;flex-direction:column;gap:4px;}
.pt-pair-name{font-family:'Cinzel',serif;font-size:22px;color:white;letter-spacing:1px;}
.pt-pair-full{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.5px;}
.pt-price-block{text-align:right;}
.pt-price{font-family:var(--mono);font-size:28px;font-weight:700;color:white;letter-spacing:-0.5px;transition:color 0.3s;}
.pt-price.flash-up{color:var(--up);}
.pt-price.flash-down{color:var(--down);}
.pt-change{font-family:var(--mono);font-size:13px;font-weight:700;margin-top:4px;}
.pt-change.up{color:var(--up);}
.pt-change.down{color:var(--down);}

/* Stats row */
.pt-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
@media(max-width:600px){.pt-stats{grid-template-columns:repeat(2,1fr);}}
.pt-stat{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px 12px;text-align:center;}
.pt-stat-label{font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:5px;}
.pt-stat-val{font-family:var(--mono);font-size:13px;font-weight:700;color:white;}

/* Bias & sentiment row */
.pt-analysis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
@media(max-width:480px){.pt-analysis{grid-template-columns:1fr;}}
.pt-bias{border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:6px;border:1px solid;}
.pt-bias.bullish{background:rgba(0,224,184,0.08);border-color:rgba(0,224,184,0.25);}
.pt-bias.bearish{background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.25);}
.pt-bias.neutral{background:rgba(255,213,59,0.08);border-color:rgba(255,213,59,0.2);}
.pt-bias-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:0.5;}
.pt-bias-val{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px;}
.pt-bias-val.bullish{color:var(--up);}
.pt-bias-val.bearish{color:var(--down);}
.pt-bias-val.neutral{color:var(--yellow);}
