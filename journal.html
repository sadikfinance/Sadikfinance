<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Journal | Sadik Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#021018,#052e2b,#064e3b);
  color:white;
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  width:100%;height:100%;
  background:
    radial-gradient(circle at 20% 30%, rgba(0,224,184,0.2), transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(0,224,184,0.15), transparent 50%);
  z-index:-1;
}

/* NAVBAR */
.navbar{
  position:fixed;width:100%;top:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 25px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
  z-index:1000;
}
.logo{font-family:'Cinzel',serif;font-size:20px;color:#00E0B8;}
.home-btn{
  background:#00E0B8;color:black;
  padding:7px 16px;border-radius:8px;
  text-decoration:none;font-weight:600;font-size:13px;
}

/* MAIN */
.main{max-width:900px;margin:90px auto 60px;padding:0 16px;}

.page-title{
  font-family:'Cinzel',serif;
  font-size:28px;
  text-align:center;
  margin-bottom:8px;
  text-shadow:0 0 20px rgba(0,224,184,0.5);
}
.page-sub{text-align:center;opacity:0.6;margin-bottom:30px;font-size:14px;}

/* FORM CARD */
.form-card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:28px;
  box-shadow:0 0 30px rgba(0,224,184,0.2);
  margin-bottom:30px;
}

.form-title{
  font-family:'Cinzel',serif;
  font-size:16px;
  color:#00E0B8;
  margin-bottom:20px;
  border-bottom:1px solid rgba(0,224,184,0.3);
  padding-bottom:10px;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
}

.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}

label{font-size:12px;opacity:0.7;font-weight:500;}

input,select,textarea{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(0,224,184,0.2);
  border-radius:8px;
  color:white;
  padding:10px 12px;
  font-size:14px;
  font-family:'Inter',sans-serif;
  outline:none;
  transition:0.2s;
}
input:focus,select:focus,textarea:focus{
  border-color:#00E0B8;
  background:rgba(0,224,184,0.08);
}
select option{background:#052e2b;color:white;}
textarea{height:70px;resize:none;}

/* Photo Upload */
.photo-upload{
  background:rgba(255,255,255,0.05);
  border:2px dashed rgba(0,224,184,0.3);
  border-radius:10px;
  padding:20px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}
.photo-upload:hover{border-color:#00E0B8;background:rgba(0,224,184,0.05);}
.photo-upload input{display:none;}
.photo-upload p{font-size:13px;opacity:0.6;margin-top:5px;}

/* Submit Button */
.submit-btn{
  width:100%;
  margin-top:20px;
  padding:14px;
  background:linear-gradient(135deg,#00E0B8,#00caa6);
  border:none;
  border-radius:12px;
  color:black;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
  font-family:'Cinzel',serif;
  letter-spacing:1px;
  transition:0.2s;
}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(0,224,184,0.4);}

/* SUMMARY */
.summary-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-bottom:25px;
}
.summary-card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:14px;
  padding:16px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,224,184,0.15);
}
.summary-card .label{font-size:11px;opacity:0.6;margin-bottom:6px;}
.summary-card .value{font-size:20px;font-weight:700;font-family:'Cinzel',serif;}
.profit{color:#00E0B8;}
.loss{color:#ff4d6d;}
.neutral{color:white;}

/* FILTERS */
.filter-bar{
  display:flex;gap:8px;
  flex-wrap:wrap;
  margin-bottom:20px;
  align-items:center;
}
.filter-btn{
  padding:8px 16px;
  border:1px solid rgba(0,224,184,0.3);
  border-radius:20px;
  background:transparent;
  color:white;
  font-size:13px;
  cursor:pointer;
  transition:0.2s;
}
.filter-btn.active,.filter-btn:hover{
  background:#00E0B8;color:black;border-color:#00E0B8;font-weight:600;
}
.clear-btn{
  margin-left:auto;
  padding:8px 16px;
  border:1px solid rgba(255,77,109,0.4);
  border-radius:20px;
  background:transparent;
  color:#ff4d6d;
  font-size:13px;
  cursor:pointer;
}
.clear-btn:hover{background:#ff4d6d;color:white;}

/* TRADE CARDS */
.trade-card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:16px;
  padding:20px;
  margin-bottom:14px;
  box-shadow:0 0 20px rgba(0,224,184,0.1);
  border-left:3px solid transparent;
  transition:0.2s;
}
.trade-card.win{border-left-color:#00E0B8;}
.trade-card.lose{border-left-color:#ff4d6d;}
.trade-card:hover{transform:translateY(-2px);}

.trade-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px;
}
.trade-pair{font-family:'Cinzel',serif;font-size:16px;}
.trade-pl{font-size:18px;font-weight:700;}

.trade-details{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:8px;margin-bottom:12px;
}
.detail{font-size:12px;opacity:0.7;}
.detail span{display:block;color:white;font-weight:500;opacity:1;margin-top:2px;}

.trade-bottom{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.tag{
  padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;
  background:rgba(0,224,184,0.15);color:#00E0B8;
}
.tag.sell{background:rgba(255,77,109,0.15);color:#ff4d6d;}
.trade-notes{font-size:12px;opacity:0.6;margin-top:8px;font-style:italic;}

.trade-img{
  width:100%;border-radius:10px;
  margin-top:12px;max-height:200px;object-fit:cover;
}

.delete-btn{
  margin-left:auto;
  background:rgba(255,77,109,0.2);
  border:none;color:#ff4d6d;
  padding:5px 10px;border-radius:6px;
  cursor:pointer;font-size:12px;
}

.empty{text-align:center;opacity:0.4;padding:40px;font-size:14px;}

/* Emotion colors */
.emotion-calm{color:#00E0B8;}
.emotion-anxious{color:#ffb347;}
.emotion-confident{color:#7ee8a2;}
.emotion-frustrated{color:#ff4d6d;}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">Sadik Finance</div>
  <a href="index.html" class="home-btn">← Home</a>
</div>

<div class="main">

  <div class="page-title">Trading Journal</div>
  <div class="page-sub">Track every trade. Improve every day.</div>

  <!-- FORM -->
  <div class="form-card">
    <div class="form-title">📋 Add New Trade</div>
    <div class="form-grid">

      <div class="form-group">
        <label>Date & Time</label>
        <input type="datetime-local" style="width:100%;appearance:none;-webkit-appearance:none;" id="tradeDate">
      </div>

      <div class="form-group">
        <label>Currency Pair</label>
        <select id="tradePair">
          <option value="">Select Pair</option>
          <optgroup label="Major Pairs">
            <option>EUR/USD</option>
            <option>GBP/USD</option>
            <option>AUD/USD</option>
            <option>NZD/USD</option>
            <option>USD/JPY</option>
            <option>USD/CAD</option>
            <option>USD/CHF</option>
          </optgroup>
          <optgroup label="Cross Pairs">
            <option>EUR/GBP</option>
            <option>EUR/JPY</option>
            <option>GBP/JPY</option>
            <option>EUR/AUD</option>
            <option>AUD/CAD</option>
          </optgroup>
          <optgroup label="Metals & Indices">
            <option>XAU/USD (Gold)</option>
            <option>US30</option>
            <option>NAS100</option>
          </optgroup>
        </select>
      </div>

      <div class="form-group">
        <label>Buy / Sell</label>
        <select id="tradeType">
          <option value="Buy">📈 Buy</option>
          <option value="Sell">📉 Sell</option>
        </select>
      </div>

      <div class="form-group">
        <label>Strategy</label>
        <select id="tradeStrategy">
          <option value="">Select Strategy</option>
          <option>ICT / SMC</option>
          <option>Liquidity Sweep</option>
          <option>Fair Value Gap</option>
          <option>Market Structure</option>
          <option>Order Block</option>
          <option>Breakout</option>
          <option>Support & Resistance</option>
          <option>Other</option>
        </select>
      </div>

      <div class="form-group">
        <label>Entry Price</label>
        <input type="number" id="tradeEntry" placeholder="1.08500" step="0.00001">
      </div>

      <div class="form-group">
        <label>Stop Loss</label>
        <input type="number" id="tradeSL" placeholder="1.08200" step="0.00001">
      </div>

      <div class="form-group">
        <label>Take Profit</label>
        <input type="number" id="tradeTP" placeholder="1.09100" step="0.00001">
      </div>

      <div class="form-group">
        <label>Profit / Loss ($)</label>
        <input type="number" id="tradePL" placeholder="+150 or -75">
      </div>

      <div class="form-group">
        <label>Emotional State</label>
        <select id="tradeEmotion">
          <option value="">Select Emotion</option>
          <option value="Calm">😌 Calm</option>
          <option value="Confident">💪 Confident</option>
          <option value="Anxious">😰 Anxious</option>
          <option value="Frustrated">😤 Frustrated</option>
          <option value="Neutral">😐 Neutral</option>
        </select>
      </div>

      <div class="form-group">
        <label>Risk:Reward (auto)</label>
        <input type="text" id="tradeRR" placeholder="Will calculate..." readonly style="opacity:0.6;">
      </div>

      <div class="form-group full">
        <label>Notes</label>
        <textarea id="tradeNotes" placeholder="Why did you take this trade? What did you learn?"></textarea>
      </div>

      <div class="form-group full">
        <label>Trade Screenshot</label>
        <div class="photo-upload" onclick="document.getElementById('tradeImg').click()">
          <input type="file" id="tradeImg" accept="image/*" onchange="previewImg(this)">
          <div id="imgPreview">
            <div style="font-size:24px;">📸</div>
            <p>Tap to upload trade screenshot</p>
          </div>
        </div>
      </div>

    </div>
    <button class="submit-btn" onclick="saveTrade()">💾 Save Trade</button>
  </div>

  <!-- SUMMARY -->
  <div class="summary-grid" id="summaryGrid">
    <div class="summary-card">
      <div class="label">Total P&L</div>
      <div class="value neutral" id="totalPL">$0</div>
    </div>
    <div class="summary-card">
      <div class="label">Win Rate</div>
      <div class="value neutral" id="winRate">0%</div>
    </div>
    <div class="summary-card">
      <div class="label">Total Trades</div>
      <div class="value neutral" id="totalTrades">0</div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('today',this)">Today</button>
    <button class="filter-btn" onclick="setFilter('week',this)">This Week</button>
    <button class="filter-btn" onclick="setFilter('month',this)">This Month</button>
    <button class="filter-btn" onclick="downloadReport()" style="background:rgba(0,224,184,0.15);border-color:#00E0B8;color:#00E0B8;">⬇️ Download</button>
    <button class="clear-btn" onclick="clearAll()">🗑 Clear All</button>
  </div>

  <!-- TRADES LIST -->
  <div id="tradesList"></div>

</div>

<script>
let currentFilter = 'all';

// Auto RR calculator
document.getElementById('tradeEntry').addEventListener('input', calcRR);
document.getElementById('tradeSL').addEventListener('input', calcRR);
document.getElementById('tradeTP').addEventListener('input', calcRR);

function calcRR(){
  let e = parseFloat(document.getElementById('tradeEntry').value);
  let sl = parseFloat(document.getElementById('tradeSL').value);
  let tp = parseFloat(document.getElementById('tradeTP').value);
  if(e && sl && tp){
    let risk = Math.abs(e - sl);
    let reward = Math.abs(tp - e);
    let rr = risk > 0 ? (reward/risk).toFixed(2) : 0;
    document.getElementById('tradeRR').value = '1:' + rr;
  }
}

function previewImg(input){
  if(input.files && input.files[0]){
    let reader = new FileReader();
    reader.onload = function(e){
      document.getElementById('imgPreview').innerHTML =
        '<img src="'+e.target.result+'" style="width:100%;border-radius:8px;max-height:150px;object-fit:cover;">';
    };
    reader.readAsDataURL(input.files[0]);
  }
}

function saveTrade(){
  let pair = document.getElementById('tradePair').value;
  let date = document.getElementById('tradeDate').value;
  let pl = parseFloat(document.getElementById('tradePL').value);

  if(!pair || !date || isNaN(pl)){
    alert('Please fill: Date, Pair and P&L!');
    return;
  }

  let imgFile = document.getElementById('tradeImg').files[0];
  let reader = new FileReader();

  function doSave(imgData){
    let trade = {
      id: Date.now(),
      date: date,
      pair: pair,
      type: document.getElementById('tradeType').value,
      strategy: document.getElementById('tradeStrategy').value,
      entry: document.getElementById('tradeEntry').value,
      sl: document.getElementById('tradeSL').value,
      tp: document.getElementById('tradeTP').value,
      pl: pl,
      rr: document.getElementById('tradeRR').value,
      emotion: document.getElementById('tradeEmotion').value,
      notes: document.getElementById('tradeNotes').value,
      img: imgData || null
    };

    let trades = JSON.parse(localStorage.getItem('sf_trades') || '[]');
    trades.unshift(trade);
    localStorage.setItem('sf_trades', JSON.stringify(trades));

    // Reset form
    document.getElementById('tradePair').value = '';
    document.getElementById('tradeDate').value = '';
    document.getElementById('tradePL').value = '';
    document.getElementById('tradeEntry').value = '';
    document.getElementById('tradeSL').value = '';
    document.getElementById('tradeTP').value = '';
    document.getElementById('tradeRR').value = '';
    document.getElementById('tradeNotes').value = '';
    document.getElementById('tradeEmotion').value = '';
    document.getElementById('tradeStrategy').value = '';
    document.getElementById('tradeImg').value = '';
    document.getElementById('imgPreview').innerHTML = '<div style="font-size:24px;">📸</div><p>Tap to upload trade screenshot</p>';

    renderTrades();
  }

  if(imgFile){
    reader.onload = e => doSave(e.target.result);
    reader.readAsDataURL(imgFile);
  } else {
    doSave(null);
  }
}

function setFilter(filter, btn){
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTrades();
}

function getFilteredTrades(){
  let trades = JSON.parse(localStorage.getItem('sf_trades') || '[]');
  let now = new Date();

  if(currentFilter === 'today'){
    let today = now.toISOString().split('T')[0];
    return trades.filter(t => t.date.startsWith(today));
  }
  if(currentFilter === 'week'){
    let weekAgo = new Date(now - 7*24*60*60*1000);
    return trades.filter(t => new Date(t.date) >= weekAgo);
  }
  if(currentFilter === 'month'){
    return trades.filter(t => {
      let d = new Date(t.date);
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    });
  }
  return trades;
}

function renderTrades(){
  let trades = getFilteredTrades();
  let container = document.getElementById('tradesList');

  let totalPL = 0, wins = 0;
  trades.forEach(t => { totalPL += t.pl; if(t.pl > 0) wins++; });
  let winRate = trades.length ? ((wins/trades.length)*100).toFixed(0) : 0;

  let plEl = document.getElementById('totalPL');
  plEl.textContent = (totalPL >= 0 ? '+$' : '-$') + Math.abs(totalPL).toFixed(2);
  plEl.className = 'value ' + (totalPL > 0 ? 'profit' : totalPL < 0 ? 'loss' : 'neutral');

  let wrEl = document.getElementById('winRate');
  wrEl.textContent = winRate + '%';
  wrEl.className = 'value ' + (winRate >= 50 ? 'profit' : 'loss');

  document.getElementById('totalTrades').textContent = trades.length;

  if(trades.length === 0){
    container.innerHTML = '<div class="empty">📭 No trades found. Add your first trade!</div>';
    return;
  }

  container.innerHTML = trades.map(t => {
    let plClass = t.pl >= 0 ? 'profit' : 'loss';
    let plSign = t.pl >= 0 ? '+$' : '-$';
    let cardClass = t.pl >= 0 ? 'win' : 'lose';
    let typeClass = t.type === 'Sell' ? 'sell' : '';
    let emotionClass = {
      'Calm':'emotion-calm','Confident':'emotion-confident',
      'Anxious':'emotion-anxious','Frustrated':'emotion-frustrated'
    }[t.emotion] || '';

    let dateStr = new Date(t.date).toLocaleDateString('en-GB',{
      day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'
    });

    return `
    <div class="trade-card ${cardClass}">
      <div class="trade-header">
        <div class="trade-pair">${t.pair}</div>
        <div class="trade-pl ${plClass}">${plSign}${Math.abs(t.pl).toFixed(2)}</div>
      </div>
      <div class="trade-details">
        <div class="detail">Date<span>${dateStr}</span></div>
        <div class="detail">Entry<span>${t.entry || '-'}</span></div>
        <div class="detail">SL / TP<span>${t.sl || '-'} / ${t.tp || '-'}</span></div>
        <div class="detail">R:R<span>${t.rr || '-'}</span></div>
        <div class="detail">Strategy<span>${t.strategy || '-'}</span></div>
        <div class="detail">Emotion<span class="${emotionClass}">${t.emotion || '-'}</span></div>
      </div>
      <div class="trade-bottom">
        <span class="tag ${typeClass}">${t.type}</span>
        ${t.strategy ? `<span class="tag">${t.strategy}</span>` : ''}
        <button class="delete-btn" onclick="deleteTrade(${t.id})">✕ Delete</button>
      </div>
      ${t.notes ? `<div class="trade-notes">💬 ${t.notes}</div>` : ''}
      ${t.img ? `<img class="trade-img" src="${t.img}">` : ''}
    </div>`;
  }).join('');
}

function downloadReport(){
  let trades = getFilteredTrades();
  let totalPL = 0, wins = 0;
  trades.forEach(t => { totalPL += t.pl; if(t.pl > 0) wins++; });
  let winRate = trades.length ? ((wins/trades.length)*100).toFixed(0) : 0;

  let html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>Sadik Finance - Trade Report</title>
  <style>
  body{font-family:Arial;background:#021018;color:white;padding:30px;}
  h1{color:#00E0B8;font-size:24px;margin-bottom:5px;}
  .summary{display:flex;gap:20px;margin:20px 0;}
  .scard{background:rgba(255,255,255,0.08);padding:15px 20px;border-radius:10px;text-align:center;}
  .scard .v{font-size:22px;font-weight:bold;}
  .profit{color:#00E0B8;} .loss{color:#ff4d6d;}
  .trade{background:rgba(255,255,255,0.06);border-radius:10px;padding:15px;margin-bottom:12px;border-left:3px solid #00E0B8;}
  .trade.lose{border-left-color:#ff4d6d;}
  .pair{font-size:18px;font-weight:bold;}
  .details{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;font-size:13px;opacity:0.8;}
  .notes{font-size:12px;opacity:0.6;margin-top:8px;font-style:italic;}
  img{width:100%;border-radius:8px;margin-top:10px;max-height:200px;object-fit:cover;}
  </style></head><body>
  <h1>Sadik Finance — Trade Report</h1>
  <p style="opacity:0.6;font-size:13px;">Generated: ${new Date().toLocaleDateString()}</p>
  <div class="summary">
    <div class="scard"><div style="font-size:12px;opacity:0.6;">Total P&L</div><div class="v ${totalPL>=0?'profit':'loss'}">${totalPL>=0?'+$':'-$'}${Math.abs(totalPL).toFixed(2)}</div></div>
    <div class="scard"><div style="font-size:12px;opacity:0.6;">Win Rate</div><div class="v ${winRate>=50?'profit':'loss'}">${winRate}%</div></div>
    <div class="scard"><div style="font-size:12px;opacity:0.6;">Trades</div><div class="v">${trades.length}</div></div>
  </div>`;

  trades.forEach(t => {
    let plClass = t.pl >= 0 ? 'profit' : 'loss';
    let cardClass = t.pl >= 0 ? '' : 'lose';
    html += `<div class="trade ${cardClass}">
      <div style="display:flex;justify-content:space-between;">
        <span class="pair">${t.pair} — ${t.type}</span>
        <span class="${plClass}" style="font-size:18px;font-weight:bold;">${t.pl>=0?'+$':'-$'}${Math.abs(t.pl).toFixed(2)}</span>
      </div>
      <div class="details">
        <div>Date: ${new Date(t.date).toLocaleDateString()}</div>
        <div>Entry: ${t.entry||'-'}</div>
        <div>SL/TP: ${t.sl||'-'}/${t.tp||'-'}</div>
        <div>R:R: ${t.rr||'-'}</div>
        <div>Strategy: ${t.strategy||'-'}</div>
        <div>Emotion: ${t.emotion||'-'}</div>
      </div>
      ${t.notes?`<div class="notes">💬 ${t.notes}</div>`:''}
      ${t.img?`<img src="${t.img}">`:''}
    </div>`;
  });

  html += `</body></html>`;
  let blob = new Blob([html], {type:'text/html'});
  let a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Sadik-Finance-Journal-Report.html';
  a.click();
}

function deleteTrade(id){
  let trades = JSON.parse(localStorage.getItem('sf_trades') || '[]');
  trades = trades.filter(t => t.id !== id);
  localStorage.setItem('sf_trades', JSON.stringify(trades));
  renderTrades();
}

function clearAll(){
  if(confirm('Delete all trades?')){
    localStorage.removeItem('sf_trades');
    renderTrades();
  }
}

renderTrades();
</script>
</body>
</html>
