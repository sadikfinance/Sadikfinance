<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Journal Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Cormorant Garamond', serif;
    background:#021018;
    color:white;
}

.container{
    max-width:1100px;
    margin:40px auto;
    padding:40px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    border-radius:20px;
}

h1{
    text-align:center;
    font-family:'Cinzel', serif;
}

input,select,textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    border-radius:6px;
    border:none;
}

textarea{height:80px;}

button{
    margin-top:10px;
    padding:8px 14px;
    border:none;
    border-radius:6px;
    background:#00E0B8;
    font-weight:bold;
    cursor:pointer;
}

.trade-card{
    margin-top:15px;
    padding:15px;
    background:#0f2730;
    border-radius:10px;
    position:relative;
}

.trade-card img{
    width:100%;
    margin-top:10px;
    border-radius:8px;
}

.delete-btn{
    position:absolute;
    top:10px;
    right:10px;
    background:#ff4d4d;
    color:white;
    border:none;
    padding:4px 8px;
    border-radius:4px;
}

.profit{color:#00ff88;font-weight:bold;}
.loss{color:#ff4d4d;font-weight:bold;}

.filter-bar{
    margin-top:20px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.summary{
    margin-top:20px;
    padding:15px;
    background:#122c35;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>Trading Journal</h1>

<input type="date" id="date">
<input type="text" id="pair" placeholder="Pair">
<select id="type">
<option>Buy</option>
<option>Sell</option>
</select>
<input type="number" id="entry" placeholder="Entry">
<input type="number" id="sl" placeholder="Stop Loss">
<input type="number" id="tp" placeholder="Take Profit">
<input type="number" id="pl" placeholder="Profit / Loss ($)">
<textarea id="notes" placeholder="Notes"></textarea>
<input type="file" id="imageInput" accept="image/*">

<button onclick="saveTrade()">Save Trade</button>

<div class="filter-bar">
<button onclick="applyFilter('all')">All</button>
<button onclick="applyFilter('week')">This Week</button>
<button onclick="applyFilter('month')">This Month</button>
<input type="number" id="daysInput" placeholder="Last X Days">
<button onclick="applyCustomDays()">Apply</button>
<button onclick="downloadFiltered()">Download Filtered</button>
<button onclick="clearAll()">Clear All</button>
</div>

<div class="summary" id="summaryBox"></div>

<div id="trades"></div>

</div>

<script>

let currentFiltered=[];

function calculateRR(entry, sl, tp){
    let risk=Math.abs(entry-sl);
    let reward=Math.abs(tp-entry);
    return risk>0?(reward/risk).toFixed(2):0;
}

function saveTrade(){

    let entryVal=parseFloat(entry.value);
    let slVal=parseFloat(sl.value);
    let tpVal=parseFloat(tp.value);
    let rr=calculateRR(entryVal,slVal,tpVal);

    const file=imageInput.files[0];
    const reader=new FileReader();

    reader.onload=function(e){

        let trade={
            date:date.value,
            pair:pair.value,
            type:type.value,
            entry:entryVal,
            sl:slVal,
            tp:tpVal,
            pl:parseFloat(pl.value),
            notes:notes.value,
            rr:rr,
            image:e.target.result||null
        };

        let trades=JSON.parse(localStorage.getItem("trades"))||[];
        trades.push(trade);
        localStorage.setItem("trades",JSON.stringify(trades));
        applyFilter('all');
    };

    if(file){
        reader.readAsDataURL(file);
    }else{
        reader.onload({target:{result:null}});
    }
}

function deleteTrade(index){
    let trades=JSON.parse(localStorage.getItem("trades"))||[];
    trades.splice(index,1);
    localStorage.setItem("trades",JSON.stringify(trades));
    applyFilter('all');
}

function applyFilter(type){
    let trades=JSON.parse(localStorage.getItem("trades"))||[];
    let now=new Date();

    if(type==="week"){
        trades=trades.filter(t=>{
            return (now-new Date(t.date))/(1000*60*60*24)<=7;
        });
    }

    if(type==="month"){
        trades=trades.filter(t=>{
            let d=new Date(t.date);
            return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
        });
    }

    currentFiltered=trades;
    displayTrades(trades);
}

function applyCustomDays(){
    let days=parseInt(daysInput.value);
    if(!days)return;
    let trades=JSON.parse(localStorage.getItem("trades"))||[];
    let now=new Date();
    trades=trades.filter(t=>{
        return (now-new Date(t.date))/(1000*60*60*24)<=days;
    });
    currentFiltered=trades;
    displayTrades(trades);
}

function displayTrades(trades){

    let container=document.getElementById("trades");
    container.innerHTML="";

    let total=0,wins=0;

    trades.forEach((t,index)=>{
        total+=t.pl;
        if(t.pl>0)wins++;

        container.innerHTML+=`
        <div class="trade-card">
        <button class="delete-btn" onclick="deleteTrade(${index})">X</button>
        <strong>${t.pair}</strong> (${t.date})<br>
        Type: ${t.type}<br>
        R:R ${t.rr}<br>
        <span class="${t.pl>=0?'profit':'loss'}">
        ${t.pl>=0?'+':''}$${t.pl}
        </span><br>
        <small>${t.notes}</small>
        ${t.image?`<img src="${t.image}">`:''}
        </div>
        `;
    });

    let winRate=trades.length?((wins/trades.length)*100).toFixed(1):0;

    // Weekly & Monthly calculation
    let allTrades=JSON.parse(localStorage.getItem("trades"))||[];
    let now=new Date();
    let weeklyTotal=0,monthlyTotal=0;

    allTrades.forEach(t=>{
        let d=new Date(t.date);
        let diff=(now-d)/(1000*60*60*24);
        if(diff<=7) weeklyTotal+=t.pl;
        if(d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear())
            monthlyTotal+=t.pl;
    });

    summaryBox.innerHTML=`
    <strong>Filtered Trades:</strong> ${trades.length}<br><br>

    <strong>Filtered P&L:</strong>
    <span class="${total>=0?'profit':'loss'}">
    ${total>=0?'Profit ':'Loss '}
    ${total>=0?'+':''}$${total.toFixed(2)}
    </span><br><br>

    <strong>Weekly P&L:</strong>
    <span class="${weeklyTotal>=0?'profit':'loss'}">
    ${weeklyTotal>=0?'Profit ':'Loss '}
    ${weeklyTotal>=0?'+':''}$${weeklyTotal.toFixed(2)}
    </span><br><br>

    <strong>Monthly P&L:</strong>
    <span class="${monthlyTotal>=0?'profit':'loss'}">
    ${monthlyTotal>=0?'Profit ':'Loss '}
    ${monthlyTotal>=0?'+':''}$${monthlyTotal.toFixed(2)}
    </span><br><br>

    <strong>Win Rate:</strong> ${winRate}%
    `;
}

function downloadFiltered(){
    let trades=currentFiltered;
    let total=0;

    let html=`
    <html>
    <head>
    <style>
    body{font-family:Georgia;background:#0b1e25;color:white;padding:40px;}
    .trade{margin-bottom:20px;padding:15px;background:#122c35;border-radius:8px;}
    .profit{color:#00ff88;font-weight:bold;}
    .loss{color:#ff4d4d;font-weight:bold;}
    img{width:100%;margin-top:10px;border-radius:8px;}
    </style>
    </head>
    <body>
    <h1>Trading Journal Report</h1>
    `;

    trades.forEach(t=>{
        total+=t.pl;
        html+=`
        <div class="trade">
        <strong>${t.pair}</strong> (${t.date})<br>
        Type: ${t.type}<br>
        R:R ${t.rr}<br>
        <span class="${t.pl>=0?'profit':'loss'}">
        ${t.pl>=0?'+':''}$${t.pl}
        </span><br>
        ${t.notes}
        ${t.image?`<img src="${t.image}">`:''}
        </div>
        `;
    });

    html+=`<h2>Total: ${total>=0?'+':''}$${total.toFixed(2)}</h2></body></html>`;

    const blob=new Blob([html],{type:"text/html"});
    const link=document.createElement("a");
    link.href=URL.createObjectURL(blob);
    link.download="Filtered-Journal-Report.html";
    link.click();
}

function clearAll(){
    localStorage.removeItem("trades");
    applyFilter('all');
}

applyFilter('all');

</script>

</body>
</html>
