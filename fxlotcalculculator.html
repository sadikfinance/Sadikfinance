<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forex Lot Size Calculator | Sadik Finance</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    font-family:'Cormorant Garamond', serif;
    background:#021018;
    color:white;
}

body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:
        radial-gradient(circle at 20% 30%, rgba(0,224,184,0.15), transparent 40%),
        radial-gradient(circle at 80% 60%, rgba(0,224,184,0.12), transparent 40%);
    z-index:-1;
}

.container{
    max-width:700px;
    margin:100px auto;
    padding:40px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    border-radius:20px;
    box-shadow:0 0 40px rgba(0,224,184,0.3);
}

h1{
    font-family:'Cinzel', serif;
    text-align:center;
    font-size:38px;
    margin-bottom:30px;
}

label{
    font-size:18px;
}

input, select{
    width:100%;
    padding:12px;
    margin-top:5px;
    margin-bottom:20px;
    border-radius:8px;
    border:none;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#00E0B8;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#00caa6;
}

.result{
    margin-top:30px;
    padding:20px;
    border-radius:12px;
    background:rgba(0,224,184,0.08);
    border:1px solid #00E0B8;
    display:none;
}
</style>
</head>

<body>

<div class="container">

<h1>Forex Lot Size Calculator</h1>

<label>Account Balance ($)</label>
<input type="number" id="balance" placeholder="10000">

<label>Risk Percentage (%)</label>
<input type="number" id="risk" placeholder="1">

<label>Stop Loss (Pips)</label>
<input type="number" id="stoploss" placeholder="20">

<label>Currency Pair</label>
<select id="pair">

<!-- Major Pairs -->
<option value="10">EUR/USD</option>
<option value="10">GBP/USD</option>
<option value="10">AUD/USD</option>
<option value="10">NZD/USD</option>
<option value="9.1">USD/JPY</option>
<option value="10">USD/CAD</option>
<option value="10">USD/CHF</option>

<!-- Cross Pairs -->
<option value="10">EUR/GBP</option>
<option value="10">EUR/AUD</option>
<option value="10">EUR/CAD</option>
<option value="9.1">EUR/JPY</option>
<option value="9.1">GBP/JPY</option>
<option value="10">AUD/CAD</option>

<!-- Gold -->
<option value="1">XAU/USD (Gold)</option>

</select>

<button onclick="calculateLot()">Calculate Position Size</button>

<div class="result" id="output">
    <h2>Results</h2>
    <p id="riskAmount"></p>
    <p id="lotSize"></p>
</div>

</div>

<script>
function calculateLot(){

    var balance = parseFloat(document.getElementById("balance").value);
    var riskPercent = parseFloat(document.getElementById("risk").value);
    var stopLoss = parseFloat(document.getElementById("stoploss").value);
    var pipValue = parseFloat(document.getElementById("pair").value);

    if(!balance || !riskPercent || !stopLoss){
        alert("Please fill all fields");
        return;
    }

    var riskAmount = balance * (riskPercent / 100);
    var lotSize = riskAmount / (stopLoss * pipValue);

    document.getElementById("output").style.display = "block";

    document.getElementById("riskAmount").innerHTML =
        "Risk Amount: <strong>$" + riskAmount.toFixed(2) + "</strong>";

    document.getElementById("lotSize").innerHTML =
        "Recommended Lot Size: <strong>" + lotSize.toFixed(2) + " Lots</strong>";
}
</script>

</body>
</html>
