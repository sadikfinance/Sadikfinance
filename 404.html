<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sadik Finance</title>
<script>
// GitHub Pages SPA redirect: strip .html extension from old bookmarked .html URLs
(function(){
  var path = window.location.pathname;
  // If old .html URL, redirect to clean folder URL
  var htmlMap = {
    '/blueprint.html': '/blueprint/',
    '/journal.html': '/journal/',
    '/fxlotcalculator.html': '/fxlotcalculator/',
    '/mavenfunded.html': '/mavenfunded/',
    '/roadmap.html': '/roadmap/'
  };
  if(htmlMap[path]){
    window.location.replace('https://sadikfinance.github.io' + htmlMap[path]);
  } else {
    window.location.replace('https://sadikfinance.github.io/');
  }
})();
</script>
</head>
<body></body>
</html>
